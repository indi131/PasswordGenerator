<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>История паролей — Генератор паролей</title>
  <link rel="stylesheet" href="common.css">
  <link rel="stylesheet" href="history.css">
</head>
<body>
  <header>
    <h1>История паролей</h1>
    <button class="clear-btn" id="clearBtn" title="Очистить всю историю">Очистить</button>
  </header>

  <div class="search-box">
    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="searchInput" placeholder="Поиск по сайту или паролю..." autocomplete="off">
  </div>

  <div class="history-list" id="historyList"></div>
  <div class="empty" id="historyEmpty">История пуста</div>

  <script src="history.js"></script>
</body>
</html>
